name: LingoLoop CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lingoloop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate legacy app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const ignored = new Set(['.git', '.github', 'node_modules', '.agents', '.codex']);
          const files = [];
          function walk(dir) {
            for (const name of fs.readdirSync(dir)) {
              if (ignored.has(name)) continue;
              const file = path.join(dir, name);
              const stat = fs.statSync(file);
              if (stat.isDirectory()) walk(file);
              else if (file.endsWith('.js')) files.push(file);
            }
          }
          walk('.');
          const { spawnSync } = require('child_process');
          let failed = false;
          for (const file of files) {
            const result = spawnSync(process.execPath, ['--check', file], { stdio: 'inherit' });
            if (result.status !== 0) failed = true;
          }
          if (failed) process.exit(1);
          console.log(`Checked ${files.length} JavaScript files.`);
          NODE

      - name: Validate JSON files
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const ignored = new Set(['.git', '.github', 'node_modules', '.agents', '.codex']);
          const files = [];
          function walk(dir) {
            for (const name of fs.readdirSync(dir)) {
              if (ignored.has(name)) continue;
              const file = path.join(dir, name);
              const stat = fs.statSync(file);
              if (stat.isDirectory()) walk(file);
              else if (file.endsWith('.json')) files.push(file);
            }
          }
          walk('.');
          for (const file of files) JSON.parse(fs.readFileSync(file, 'utf8'));
          console.log(`Validated ${files.length} JSON files.`);
          NODE

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lingoloop:${{ github.sha }} .

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - validate
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured, so CI passed without triggering Render."
